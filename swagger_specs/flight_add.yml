tags:
  - Flights
security:
  - Bearer: []
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - flight_code
        - origin_airport
        - destination_airport
        - departure_time
        - arrival_time
        - base_price
      properties:
        flight_code:
          type: string
          minLength: 3
          maxLength: 8
          description: Unique flight code (will be converted to uppercase)
          example: AA1234
        origin_airport:
          type: string
          minLength: 3
          maxLength: 30
          description: Origin airport name or code
          example: JFK - John F Kennedy International
        destination_airport:
          type: string
          minLength: 3
          maxLength: 30
          description: Destination airport name or code
          example: LAX - Los Angeles International
        departure_time:
          type: string
          format: date-time
          description: Flight departure time (YYYY-MM-DD HH:MM:SS) - must be in future
          example: "2026-12-25 10:30:00"
        arrival_time:
          type: string
          format: date-time
          description: Flight arrival time (YYYY-MM-DD HH:MM:SS) - must be after departure
          example: "2026-12-25 14:45:00"
        base_price:
          type: number
          format: decimal
          minimum: 0
          description: Base ticket price
          example: 299.99
responses:
  201:
    description: Flight created successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Flight created successfully
        flight:
          type: object
          properties:
            id:
              type: string
              format: uuid
            flight_code:
              type: string
              example: AA1234
            origin_airport:
              type: string
            destination_airport:
              type: string
            departure_time:
              type: string
              format: date-time
            arrival_time:
              type: string
              format: date-time
            base_price:
              type: string
              example: "299.99"
            status:
              type: string
              example: active
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
  400:
    description: Validation error or bad request
    schema:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          description: Field-specific validation errors
  401:
    description: Not authenticated
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  403:
    description: Not authorized (admin role required)
    schema:
      type: object
      properties:
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: Admin privileges required
  409:
    description: Flight code already exists
    schema:
      type: object
      properties:
        error:
          type: string
          example: Conflict
        message:
          type: string
          example: Flight code AA1234 already exists
