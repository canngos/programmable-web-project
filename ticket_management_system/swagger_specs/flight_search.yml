summary: Search flights
description: Search for flights with optional filters by origin, destination, and dates. Returns paginated results.
operationId: searchFlights
tags:
  - Flights
produces:
  - application/json
security:
  - Bearer: []
parameters:
  - name: origin_airport
    in: query
    type: string
    required: false
    description: Filter by origin airport code or name (partial match)
    example: JFK
  - name: destination_airport
    in: query
    type: string
    required: false
    description: Filter by destination airport code or name (partial match)
    example: LAX
  - name: departure_date
    in: query
    type: string
    format: date
    required: false
    description: Filter by departure date (YYYY-MM-DD)
    example: "2026-03-15"
  - name: arrival_date
    in: query
    type: string
    format: date
    required: false
    description: Filter by arrival date (YYYY-MM-DD)
    example: "2026-03-15"
  - name: page
    in: query
    type: integer
    default: 1
    description: Page number (1-indexed)
  - name: per_page
    in: query
    type: integer
    default: 10
    description: Number of items per page (max 100)
responses:
  200:
    description: Paginated list of flights matching search criteria
    schema:
      type: object
      properties:
        flights:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              flight_code:
                type: string
                example: AA1234
              origin_airport:
                type: string
                example: JFK
              destination_airport:
                type: string
                example: LAX
              departure_time:
                type: string
                format: date-time
                example: "2026-03-15T10:30:00"
              arrival_time:
                type: string
                format: date-time
                example: "2026-03-15T14:45:00"
              base_price:
                type: string
                example: "299.99"
              status:
                type: string
                enum: [active, inactive, started, en_route, landed, cancelled, delayed]
                example: active
              created_at:
                type: string
                format: date-time
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total_pages:
              type: integer
            total_items:
              type: integer
            has_next:
              type: boolean
            has_prev:
              type: boolean
            next_page:
              type: integer
              nullable: true
            prev_page:
              type: integer
              nullable: true
    examples:
      application/json:
        flights:
          - id: "flight-001"
            flight_code: AA1234
            origin_airport: JFK
            destination_airport: LAX
            departure_time: "2026-03-15T10:30:00"
            arrival_time: "2026-03-15T14:45:00"
            base_price: "299.99"
            status: active
            created_at: "2026-01-01T08:00:00"
          - id: "flight-002"
            flight_code: AA5678
            origin_airport: JFK
            destination_airport: LAX
            departure_time: "2026-03-15T15:00:00"
            arrival_time: "2026-03-15T19:15:00"
            base_price: "349.99"
            status: active
            created_at: "2026-01-01T08:00:00"
        pagination:
          page: 1
          per_page: 10
          total_pages: 5
          total_items: 42
          has_next: true
          has_prev: false
          next_page: 2
          prev_page: null
  400:
    description: Validation error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          description: Field-specific validation errors
  401:
    description: Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  500:
    description: Internal server error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error
        message:
          type: string
