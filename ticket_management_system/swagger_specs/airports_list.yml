summary: List all available airports
description: Get a list of all distinct airports available in the system
operationId: listAirports
tags:
  - Flights
produces:
  - application/json
security:
  - Bearer: []
responses:
  200:
    description: List of distinct airports available in the system
    schema:
      type: object
      properties:
        airports:
          type: array
          items:
            type: string
          example:
            - "ATL"
            - "DFW"
            - "JFK"
            - "LAX"
            - "ORD"
        count:
          type: integer
          description: Total number of distinct airports
          example: 5
  401:
    description: Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  500:
    description: Internal server error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error
        message:
          type: string
