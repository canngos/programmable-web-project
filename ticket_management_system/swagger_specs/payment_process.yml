tags:
  - Payments
security:
  - Bearer: []
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - booking_number
        - credit_card_number
        - security_code
      properties:
        booking_number:
          type: string
          example: BK123456
        credit_card_number:
          type: string
          minLength: 16
          maxLength: 16
          example: "1234567812345678"
        security_code:
          type: string
          minLength: 3
          maxLength: 3
          example: "123"
responses:
  200:
    description: Payment successful and booking confirmed
    schema:
      type: object
      properties:
        message:
          type: string
          example: Payment successful. Booking confirmed.
        booking_number:
          type: string
          example: BK123456
        status:
          type: string
          enum: [booked, paid, cancelled, refunded]
          example: paid
  400:
    description: Invalid request payload
    schema:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Credit card number must be 16 digits
  401:
    description: Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  403:
    description: User does not own the booking
    schema:
      type: object
      properties:
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: You cannot pay for another user's booking
  404:
    description: Booking not found
    schema:
      type: object
      properties:
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: Booking not found
  409:
    description: Booking already paid
    schema:
      type: object
      properties:
        error:
          type: string
          example: Conflict
        message:
          type: string
          example: Booking is already paid
  500:
    description: Internal server error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error
        message:
          type: string
