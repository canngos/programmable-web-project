summary: Get booking details by ID
description: Retrieve details of a specific booking. Only the booking owner or admin can view the booking.
tags:
  - Bookings
security:
  - Bearer: []
parameters:
  - name: booking_id
    in: path
    required: true
    type: string
    format: uuid
    description: Booking identifier
    example: "00000000-0000-0000-0000-000000000001"
responses:
  200:
    description: Booking details
    schema:
      type: object
      properties:
        booking:
          type: object
          properties:
            id:
              type: string
              format: uuid
            user_id:
              type: string
              format: uuid
            flight_id:
              type: string
              format: uuid
            total_price:
              type: string
              example: "300.00"
            booking_status:
              type: string
              enum: [booked, paid, cancelled, refunded]
              example: booked
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            tickets:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  passenger_name:
                    type: string
                  passenger_passport_num:
                    type: string
                  seat_num:
                    type: string
                  seat_class:
                    type: string
                    enum: [economy, business, first]
                  price:
                    type: string
                    example: "300.00"
                  created_at:
                    type: string
                    format: date-time
  401:
    description: Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  403:
    description: User cannot access this booking
    schema:
      type: object
      properties:
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: You are not allowed to access this booking
  404:
    description: Booking not found
    schema:
      type: object
      properties:
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: Booking with ID 00000000-0000-0000-0000-000000000001 not found
