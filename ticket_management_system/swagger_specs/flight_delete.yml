Delete Flight
---
tags:
  - Flights
summary: Delete a flight by ID (Admin only)
description: |
  Delete a flight from the system. This operation will cascade delete all related bookings and tickets.
  Only administrators can delete flights.
security:
  - Bearer: []
parameters:
  - in: path
    name: flight_id
    type: string
    format: uuid
    required: true
    description: UUID of the flight to delete
    example: "123e4567-e89b-12d3-a456-426614174000"
responses:
  200:
    description: Flight deleted successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: "Flight 123e4567-e89b-12d3-a456-426614174000 deleted successfully"
  401:
    description: Unauthorized - Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
          example: Authentication required
        message:
          type: string
          example: No token provided
  403:
    description: Forbidden - Admin privileges required
    schema:
      type: object
      properties:
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: Admin privileges required
  404:
    description: Not Found - Flight not found
    schema:
      type: object
      properties:
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: "Flight with ID 123e4567-e89b-12d3-a456-426614174000 not found"
  500:
    description: Internal Server Error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error
        message:
          type: string
