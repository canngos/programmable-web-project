tags:
  - Bookings
security:
  - Bearer: []
parameters:
  - name: page
    in: query
    type: integer
    default: 1
    description: Page number (1-indexed)
  - name: per_page
    in: query
    type: integer
    default: 10
    description: Number of items per page (max 100)
  - name: all
    in: query
    type: boolean
    default: false
    description: Admin only. When true, return bookings for all users.
responses:
  200:
    description: Paginated list of bookings
    schema:
      type: object
      properties:
        bookings:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              user_id:
                type: string
                format: uuid
              flight_id:
                type: string
                format: uuid
              total_price:
                type: string
                example: "300.00"
              booking_status:
                type: string
                enum: [booked, paid, cancelled, refunded]
                example: booked
              ticket_count:
                type: integer
                example: 1
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total_pages:
              type: integer
            total_items:
              type: integer
            has_next:
              type: boolean
            has_prev:
              type: boolean
            next_page:
              type: integer
              nullable: true
            prev_page:
              type: integer
              nullable: true
  400:
    description: Validation error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          description: Field-specific validation errors
  401:
    description: Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
