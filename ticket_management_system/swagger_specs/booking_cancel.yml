summary: Cancel booking
operationId: cancelBooking
description: Cancel an existing booking by setting its status to cancelled. Only the booking owner or admin can cancel.
tags:
  - Bookings
consumes:
  - application/json
produces:
  - application/json
parameters:
  - name: booking_id
    in: path
    required: true
    schema:
      type: string
      format: uuid
    description: The unique identifier of the booking to cancel
security:
  - Bearer: []
responses:
  200:
    description: Booking cancelled successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Booking cancelled successfully
        booking:
          type: object
          properties:
            id:
              type: string
              format: uuid
            user_id:
              type: string
              format: uuid
            flight_id:
              type: string
              format: uuid
            total_price:
              type: string
              example: "599.99"
            booking_status:
              type: string
              example: cancelled
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            tickets:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  passenger_name:
                    type: string
                  passenger_passport_num:
                    type: string
                  seat_num:
                    type: string
                  seat_class:
                    type: string
                  price:
                    type: string
                  created_at:
                    type: string
                    format: date-time
  400:
    description: Bad request - booking is already cancelled or refunded
    schema:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Booking is already cancelled
  401:
    description: Unauthorized - missing or invalid token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  403:
    description: Forbidden - not allowed to cancel this booking
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  404:
    description: Booking not found
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  500:
    description: Internal server error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error
        message:
          type: string
