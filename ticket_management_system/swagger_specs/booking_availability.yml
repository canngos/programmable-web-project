summary: Check seat availability
operationId: checkAvailability
description: Check if a specific seat is available on a given flight
tags:
  - Bookings
produces:
  - application/json
security:
  - Bearer: []
parameters:
  - name: flight_id
    in: query
    required: true
    type: string
    format: uuid
    description: Flight identifier
    example: "fe4a1338-4b98-4b51-9f5c-1234567890ab"
  - name: seat_num
    in: query
    required: true
    type: string
    description: Seat number to check (1-4 characters)
    example: 12A
responses:
  200:
    description: Seat availability result
    schema:
      type: object
      properties:
        flight_id:
          type: string
          format: uuid
        seat_num:
          type: string
          example: 12A
        available:
          type: boolean
          example: true
  400:
    description: Validation error or bad request
    schema:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          description: Field-specific validation errors when schema validation fails
  401:
    description: Invalid or missing token
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  404:
    description: Flight not found
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  500:
    description: Internal server error
    schema:
      type: object
      properties:
        error:
          type: string
          example: Internal Server Error
        message:
          type: string
